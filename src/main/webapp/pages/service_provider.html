<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Services</title>
    <link rel="stylesheet" href="../css/serviceProvide.css">
</head>
<body>
<div class="header">
        <h2>Service Provider Form</h2>
    </div>
    <div class="content">
        <div class="left">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTQR9Z3eU-BOfe1siMe6oN25EtGZSGrqNtAYA&s" alt="">
        </div>
        <div class="right">
            <h2>Service Provider Form</h2>
            <form class="form" action="serviceprovider" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>

                <label for="id">Provider ID:</label>
                <input type="number" id="id" name="id" required><br><br>
                
                <label for="service">Service Type:</label>
                <input type="text" id="service" name="service" required><br><br>

                <label for="location">Location:</label>
                <input type="text" id="location" name="location" required><br><br>

                <label for="availability">Availability:</label>
                <input type="text" id="availability" name="availability" required><br><br>

                <button class="button" type="submit">Submit</button>
            </form>
        </div>
    </div>
    
</body>
</html>
