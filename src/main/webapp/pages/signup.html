<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Service Finder - Sign Up</title>
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <div class="brand">
                <h1>Smart Service Finder</h1>
                <p>Create your account to start discovering services.</p>
            </div>
            <form class="login-form" action="/SmartServiceFinder/signup" method="post">
                <div class="field-group">
                    <label for="username">Full Name</label>
                    <input id="fullname" name="username" type="text" placeholder="Enter your full name" required>
                </div>
                
                <div class="field-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="Enter your email" required>
                </div>
                
                <div class="field-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Create a password" required>
                </div>
                
                <div class="field-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input id="confirm-password" name="confirm-password" type="password" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit"  class="login-button">Create Account</button>
                
                <div class="form-actions">
                    <a class="secondary-link" href="/login.html">Already have an account? Login</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
